version: "3.8"

services:
  mongodb_ex2:
    image: mongo:latest
    container_name: mongodb_plantas
    # Sem "ports" -> invisível para o exterior
    volumes:
      - mongo_data_plantas:/data/db
    environment:
      - MONGO_INITDB_DATABASE=plantas_db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 5s
      retries: 5

  importador:
    build: .
    container_name: ex2_importador
    command: node dataset/importar.js
    environment:
      # CORRIGIDO: usa MONGODB_URI (igual ao importar.js) e nome correto do serviço
      - MONGODB_URI=mongodb://mongodb_ex2:27017/plantas_db
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      mongodb_ex2:
        condition: service_healthy

  api_plantas:
    build: .
    container_name: api_plantas
    ports:
      - "19040:19040"
    environment:
      - MONGODB_URI=mongodb://mongodb_ex2:27017/plantas_db
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      importador:
        condition: service_completed_successfully
      mongodb_ex2:
        condition: service_healthy
    restart: always

  frontend_nginx:
    image: nginx:alpine
    container_name: nginx_plantas
    ports:
      - "19041:19041"
    volumes:
      - ./public:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api_plantas

volumes:
  mongo_data_plantas: